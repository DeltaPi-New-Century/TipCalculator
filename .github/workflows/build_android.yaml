name: Build
on:
  push:
    branches:
      - master
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Build Signal
        run: |
          curl -X POST https://api.github.com/repos/DeltaPi-New-Century/TC2Infra/dispatches \
          -H 'Accept: application/vnd.github.v3+json' \
          -H 'Authorization: token ${{ secrets.TIPCALCULATOR_PAT }}' \
          --data '{"event_type": "build-repo-b", "client_payload": {"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}}'
